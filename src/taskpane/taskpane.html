<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Excel Import</title>

  <!-- Office.js -->
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>

  <!-- PDF.js for PDF parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Mammoth.js for DOCX parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

  <!-- SheetJS for XLSX parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-row">
        <svg class="logo" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <h1>Smart Import</h1>
      </div>
      <p class="subtitle">Dokumente in dynamische Tabellen verwandeln</p>
    </header>

    <!-- Settings Panel (collapsible) -->
    <section id="settings-section">
      <button id="settings-toggle" class="settings-toggle" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-8.66-3.34l1.41-1.41m12.5-12.5l1.41-1.41M1 12h2m18 0h2m-3.34 8.66l-1.41-1.41M4.75 4.75L3.34 3.34"/>
        </svg>
        <span>Einstellungen</span>
        <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div id="settings-panel" class="settings-panel hidden">
        <div class="field">
          <label for="provider-select">KI-Anbieter</label>
          <select id="provider-select">
            <option value="openai">OpenAI (GPT-4o)</option>
            <option value="anthropic">Anthropic (Claude)</option>
          </select>
        </div>
        <div class="field">
          <label for="api-key-input">API-Schlüssel</label>
          <div class="key-input-row">
            <input type="password" id="api-key-input" placeholder="sk-... oder sk-ant-..." autocomplete="off" />
            <button id="toggle-key-visibility" class="icon-btn" title="Anzeigen/Verbergen">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <button id="save-key-btn" class="btn-small">Speichern</button>
        </div>
        <div id="key-status" class="key-status"></div>
      </div>
    </section>

    <!-- Drop Zone -->
    <section id="drop-section">
      <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="Datei hierher ziehen oder klicken">
        <div class="drop-zone-content">
          <svg class="drop-icon" viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-text">Datei hierher ziehen</p>
          <p class="drop-hint">PDF, Word, Excel oder Bild (JPG/PNG)</p>
          <span class="drop-or">oder</span>
          <button id="browse-btn" class="btn-browse">Datei auswählen</button>
          <input type="file" id="file-input" accept=".pdf,.docx,.xlsx,.xls,.jpg,.jpeg,.png,.gif,.bmp,.webp" hidden />
        </div>
      </div>
    </section>

    <!-- File Preview -->
    <section id="file-preview" class="hidden">
      <div class="file-card">
        <div class="file-info">
          <svg id="file-type-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <div>
            <p id="file-name" class="file-name"></p>
            <p id="file-size" class="file-meta"></p>
          </div>
        </div>
        <button id="remove-file" class="icon-btn" title="Entfernen">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Options -->
    <section id="options-section" class="hidden">
      <div class="field">
        <label for="start-cell">Startposition</label>
        <input type="text" id="start-cell" value="A1" placeholder="z.B. A1, B3" />
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="format-table" checked />
        <label for="format-table">Professionell formatieren</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="use-formulas" checked />
        <label for="use-formulas">Formeln statt Festwerte</label>
      </div>
      <button id="import-btn" class="btn-primary">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        <span>Importieren</span>
      </button>
    </section>

    <!-- Progress -->
    <section id="progress-section" class="hidden">
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p id="progress-text" class="progress-text">Wird verarbeitet…</p>
    </section>

    <!-- Result -->
    <section id="result-section" class="hidden">
      <div id="result-card" class="result-card">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <p id="result-text"></p>
      </div>
    </section>

    <!-- Error -->
    <section id="error-section" class="hidden">
      <div class="error-card">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <p id="error-text"></p>
      </div>
    </section>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
